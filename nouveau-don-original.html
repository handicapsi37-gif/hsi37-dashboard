<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HSI37 — Nouveau don de matériel</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    .page-don {
      max-width: 820px;
      margin: 0 auto;
      padding: 1.5rem 2rem 3rem;
    }
    .page-don__entete {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .page-don__titre {
      font-family: 'Oswald', sans-serif;
      font-size: 1.45rem;
      color: var(--bleu-fonce);
      flex: 1;
    }
    .lien-retour {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--bleu-hsi);
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      padding: 0.3rem 0;
    }
    .lien-retour:hover { color: var(--bleu-fonce); }

    .formulaire-don {
      background: var(--blanc);
      border-radius: var(--rayon-large);
      box-shadow: var(--ombre);
      padding: 2rem;
    }
    .section-form {
      margin-bottom: 2rem;
    }
    .section-form__titre {
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--bleu-hsi);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
      padding-bottom: 0.4rem;
      border-bottom: 2px solid var(--bleu-hsi);
      display: inline-block;
    }

    /* Radio bénéficiaire */
    .radio-groupe {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1rem;
    }
    .radio-option {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      font-weight: 600;
      color: var(--encre);
    }
    .radio-option input[type="radio"] { accent-color: var(--bleu-hsi); }

    /* Grille 2 colonnes */
    .grille-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 600px) { .grille-2 { grid-template-columns: 1fr; } }
    .col-large { grid-column: 1 / -1; }

    /* Tableau matériel */
    .tableau-materiel {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 0.75rem;
    }
    .tableau-materiel th {
      background: var(--gris-clair);
      color: var(--bleu-fonce);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.5rem 0.6rem;
      text-align: left;
      border: 1px solid var(--gris-bord);
    }
    .tableau-materiel td {
      padding: 0.4rem 0.5rem;
      border: 1px solid var(--gris-bord);
      vertical-align: middle;
    }
    .tableau-materiel input {
      width: 100%;
      border: none;
      background: transparent;
      font-size: 0.9rem;
      color: var(--encre);
      outline: none;
      padding: 0.2rem 0;
    }
    .tableau-materiel input:focus {
      outline: 2px solid var(--bleu-hsi);
      outline-offset: 1px;
      border-radius: 2px;
    }
    .btn-suppr-ligne {
      background: none;
      border: none;
      color: var(--rouge-statut);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.2rem 0.4rem;
      border-radius: var(--rayon);
      line-height: 1;
    }
    .btn-suppr-ligne:hover { background: var(--rouge-fond); }
    .btn-ajouter-ligne {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: none;
      border: 1.5px dashed var(--bleu-hsi);
      color: var(--bleu-hsi);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.4rem 0.9rem;
      border-radius: var(--rayon);
      cursor: pointer;
      margin-top: 0.25rem;
    }
    .btn-ajouter-ligne:hover { background: #e8f2fb; }

    /* Photos */
    .zone-upload {
      border: 2px dashed var(--gris-bord);
      border-radius: var(--rayon);
      padding: 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .zone-upload:hover, .zone-upload.drag-over {
      border-color: var(--bleu-hsi);
      background: #e8f2fb;
    }
    .zone-upload input[type="file"] { display: none; }
    .zone-upload__label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      color: var(--gris-moyen);
      font-size: 0.9rem;
    }
    .zone-upload__label svg { color: var(--bleu-hsi); }
    .apercu-photos {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }
    .apercu-photo {
      position: relative;
      width: 80px;
      height: 80px;
    }
    .apercu-photo img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: var(--rayon);
      border: 1px solid var(--gris-bord);
    }
    .apercu-photo__suppr {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--rouge-statut);
      color: white;
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* Barre de progression upload */
    .barre-progression {
      height: 6px;
      background: var(--gris-clair);
      border-radius: 99px;
      margin-top: 0.5rem;
      overflow: hidden;
      display: none;
    }
    .barre-progression__remplissage {
      height: 100%;
      background: var(--bleu-hsi);
      width: 0%;
      transition: width 0.3s;
      border-radius: 99px;
    }

    /* Actions bas de formulaire */
    .actions-formulaire {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--gris-clair);
      flex-wrap: wrap;
    }

    /* Date sélecteurs */
    .date-conteneur {
      display: flex;
      gap: 0.5rem;
    }
    .date-conteneur select { flex: 1; }
    .date-conteneur select:last-child { flex: 1.4; }
  </style>
</head>
<body>

  <!-- ========== ÉCRAN DE CONNEXION ========== -->
  <div id="ecran-connexion" aria-labelledby="connexion-titre">
    <div class="connexion-carte">
      <div class="connexion-entete">
        <img src="assets/cropped-HSI37-512x512-1.png"
             alt="hsi37 — Handicap Solidarité pour l'Inclusion"
             class="connexion-logo-img" />
      </div>
      <h1 class="connexion-titre" id="connexion-titre">Connexion</h1>
      <form id="formulaire-connexion" class="connexion-formulaire" novalidate>
        <div class="champ-groupe">
          <label for="connexion-email" class="champ-label">E-mail</label>
          <input type="email" id="connexion-email" class="champ-input"
                 autocomplete="email" required placeholder="votre@email.fr" />
        </div>
        <div class="champ-groupe">
          <label for="connexion-mdp" class="champ-label">Mot de passe</label>
          <input type="password" id="connexion-mdp" class="champ-input"
                 autocomplete="current-password" required placeholder="••••••••" />
        </div>
        <div id="connexion-erreur" class="connexion-erreur" role="alert" hidden></div>
        <button type="submit" class="btn btn--primaire connexion-btn">Se connecter</button>
      </form>
    </div>
  </div>

  <!-- ========== EN-TÊTE ========== -->
  <header class="entete" role="banner" hidden>
    <div class="entete__logo-bloc">
      <img src="assets/hsi37-redim-demi.png"
           alt="hsi37 — Handicap Solidarité pour l'Inclusion 37"
           class="entete__logo-img" />
    </div>
    <h1 class="entete__titre">Tableau de bord HSI37</h1>
    <div class="entete__actions">
      <a href="index.html" class="btn-retour-accueil" aria-label="Retour à l'accueil">
        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24" width="15" height="15" fill="none"
             stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1z"/>
          <polyline points="9 21 9 13 15 13 15 21"/>
        </svg>
        Accueil
      </a>
      <button class="btn btn--deconnexion" id="btn-deconnexion" type="button">
        Se déconnecter
      </button>
    </div>
  </header>

  <!-- ========== CONTENU PRINCIPAL ========== -->
  <main class="contenu-principal" id="contenu-principal" hidden>
    <div class="page-don">

      <!-- En-tête page -->
      <div class="page-don__entete">
        <a href="dons-materiel.html" class="lien-retour" aria-label="Retour à la liste des dons">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16"
               fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Retour à la liste
        </a>
        <h2 class="page-don__titre">Nouveau don de matériel</h2>
      </div>

      <!-- Messages -->
      <div id="message-succes" class="message-succes" role="status" aria-live="polite" hidden></div>
      <div id="message-erreur" class="message-erreur" role="alert" aria-live="assertive" hidden></div>

      <!-- ========== FORMULAIRE ========== -->
      <form class="formulaire-don" id="formulaire-don" novalidate>

        <!-- ① BÉNÉFICIAIRE -->
        <div class="section-form">
          <div class="section-form__titre">Bénéficiaire</div>

          <div class="radio-groupe" role="radiogroup" aria-label="Type de bénéficiaire">
            <label class="radio-option">
              <input type="radio" name="type-benef" id="radio-externe" value="Association externe" checked />
              Association / Organisme externe
            </label>
            <label class="radio-option">
              <input type="radio" name="type-benef" id="radio-membre" value="Membre HSI37" />
              Membre HSI37
            </label>
          </div>

          <!-- Bénéficiaire externe -->
          <div id="bloc-externe">
            <div class="champ-groupe">
              <label for="benef-nom-libre" class="champ-label">
                Nom de l'association / organisme <span aria-hidden="true">*</span>
              </label>
              <input type="text" id="benef-nom-libre" class="champ-input"
                     placeholder="Ex : Association Handisport Maroc" autocomplete="organization" />
            </div>
          </div>

          <!-- Bénéficiaire membre HSI37 -->
          <div id="bloc-membre" hidden>
            <div class="champ-groupe">
              <label for="benef-adherent" class="champ-label">
                Sélectionner un adhérent <span aria-hidden="true">*</span>
              </label>
              <select id="benef-adherent" class="champ-input champ-select">
                <option value="">— Chargement… —</option>
              </select>
            </div>
          </div>
        </div>

        <!-- ② DESTINATION + ③ DATE -->
        <div class="section-form">
          <div class="section-form__titre">Expédition</div>
          <div class="grille-2">
            <div class="champ-groupe">
              <label for="ville-destination" class="champ-label">Ville de destination</label>
              <input type="text" id="ville-destination" class="champ-input"
                     placeholder="Ex : Casablanca" />
            </div>
            <div class="champ-groupe">
              <label for="pays-destination" class="champ-label">Pays de destination</label>
              <input type="text" id="pays-destination" class="champ-input"
                     placeholder="Ex : Maroc" />
            </div>
            <div class="champ-groupe col-large">
              <label class="champ-label">
                Date d'expédition <span aria-hidden="true">*</span>
              </label>
              <div class="date-conteneur">
                <select id="date-jour" class="champ-input champ-select" aria-label="Jour">
                  <option value="">Jour</option>
                </select>
                <select id="date-mois" class="champ-input champ-select" aria-label="Mois">
                  <option value="">Mois</option>
                  <option value="01">Janvier</option>
                  <option value="02">Février</option>
                  <option value="03">Mars</option>
                  <option value="04">Avril</option>
                  <option value="05">Mai</option>
                  <option value="06">Juin</option>
                  <option value="07">Juillet</option>
                  <option value="08">Août</option>
                  <option value="09">Septembre</option>
                  <option value="10">Octobre</option>
                  <option value="11">Novembre</option>
                  <option value="12">Décembre</option>
                </select>
                <select id="date-annee" class="champ-input champ-select" aria-label="Année">
                  <option value="">Année</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- ④ MATÉRIEL -->
        <div class="section-form">
          <div class="section-form__titre">Matériel expédié</div>
          <table class="tableau-materiel" id="tableau-materiel" aria-label="Liste du matériel">
            <thead>
              <tr>
                <th style="width:50%">Désignation <span aria-hidden="true">*</span></th>
                <th style="width:18%">Qté expédiée</th>
                <th style="width:18%">Qté reçue</th>
                <th style="width:8%"></th>
              </tr>
            </thead>
            <tbody id="corps-materiel">
              <!-- Lignes ajoutées dynamiquement -->
            </tbody>
          </table>
          <button type="button" class="btn-ajouter-ligne" id="btn-ajouter-ligne"
                  aria-label="Ajouter une ligne de matériel">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14"
                 fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            Ajouter une ligne
          </button>
        </div>

        <!-- ⑤ PHOTOS -->
        <div class="section-form">
          <div class="section-form__titre">Photos</div>
          <div class="zone-upload" id="zone-upload">
            <label class="zone-upload__label" for="input-photos">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32"
                   fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <span><strong>Cliquer pour choisir des photos</strong> ou glisser-déposer</span>
              <span style="font-size:0.8rem;">JPG, PNG, WEBP — plusieurs fichiers acceptés</span>
            </label>
            <input type="file" id="input-photos" accept="image/*" multiple />
          </div>
          <div class="apercu-photos" id="apercu-photos"></div>
          <div class="barre-progression" id="barre-progression">
            <div class="barre-progression__remplissage" id="barre-remplissage"></div>
          </div>
        </div>

        <!-- ⑥ NUMÉRO DE SUIVI -->
        <div class="section-form">
          <div class="section-form__titre">Suivi transporteur</div>
          <div class="champ-groupe">
            <label for="numero-suivi" class="champ-label">Numéro de suivi</label>
            <input type="text" id="numero-suivi" class="champ-input"
                   placeholder="Ex : 1Z999AA10123456784" autocomplete="off" />
          </div>
        </div>

        <!-- ⑦ STATUT -->
        <div class="section-form">
          <div class="section-form__titre">Statut</div>
          <div class="champ-groupe">
            <label for="statut-don" class="champ-label">
              Statut du don <span aria-hidden="true">*</span>
            </label>
            <select id="statut-don" class="champ-input champ-select">
              <option value="">— Sélectionner —</option>
              <option value="Préparé">Préparé</option>
              <option value="Expédié">Expédié</option>
              <option value="Livré">Livré</option>
              <option value="Annulé">Annulé</option>
            </select>
          </div>
        </div>

        <!-- ⑧ NOTES -->
        <div class="section-form">
          <div class="section-form__titre">Notes</div>
          <div class="champ-groupe">
            <label for="notes-don" class="champ-label">Notes libres</label>
            <textarea id="notes-don" class="champ-input champ-textarea" rows="4"
                      placeholder="Informations complémentaires, conditions d'expédition, contacts…"></textarea>
          </div>
        </div>

        <!-- ACTIONS -->
        <div class="actions-formulaire">
          <a href="dons-materiel.html" class="btn btn--secondaire">Annuler</a>
          <button type="submit" class="btn btn--primaire" id="btn-enregistrer">
            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg"
                 viewBox="0 0 24 24" width="16" height="16">
              <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5"
                    fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Enregistrer le don
          </button>
        </div>

      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="nouveau-don.js"></script>
</body>
</html>
